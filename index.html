<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>この子の寄り道</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="brand-button" type="button" data-screen-target="home" aria-label="今日の部屋へ戻る">
          <span class="brand-dog" aria-hidden="true"></span>
          <span>この子の寄り道</span>
        </button>
        <button class="test-button" type="button" id="notify-test-button">通知を試す</button>
      </header>

      <main>
        <section class="screen is-active" id="home-screen" aria-labelledby="home-wish">
          <div class="room room-home">
            <div class="window" aria-hidden="true"><span></span></div>
            <div class="shelf" aria-hidden="true"><span></span><span></span></div>
            <div class="plant" aria-hidden="true"><span></span><span></span><i></i></div>
            <div class="cushion" aria-hidden="true"></div>
            <div class="rug" aria-hidden="true"></div>

            <div class="notice-chip">今日のわがままが届きました</div>

            <div class="speech-bubble main-bubble">
              <p>モカのわがまま</p>
              <h1 id="home-wish"></h1>
              <span>今日は、この子に誘われて寄り道する。</span>
            </div>

            <div class="dog dog-large is-looking" aria-label="小さな柴犬風の犬、モカ" role="img">
              <span class="tail"></span>
              <span class="body"></span>
              <span class="chest"></span>
              <span class="head"></span>
              <span class="ear ear-left"></span>
              <span class="ear ear-right"></span>
              <span class="muzzle"></span>
              <span class="brow brow-left"></span>
              <span class="brow brow-right"></span>
              <span class="eye eye-left"></span>
              <span class="eye eye-right"></span>
              <span class="nose"></span>
              <span class="mouth"></span>
              <span class="cheek cheek-left"></span>
              <span class="cheek cheek-right"></span>
              <span class="paw paw-left"></span>
              <span class="paw paw-right"></span>
            </div>

            <div class="action-dock">
              <button class="primary-button" type="button" id="follow-button">この子のわがままを叶えに行く</button>
              <button class="ghost-button" type="button" id="home-skip-button">今日は部屋にいる</button>
            </div>
          </div>
        </section>

        <section class="screen" id="start-screen" aria-labelledby="start-wish">
          <div class="room room-start">
            <div class="window small-window" aria-hidden="true"><span></span></div>
            <div class="rug soft-rug" aria-hidden="true"></div>

            <div class="speech-bubble side-bubble">
              <p>出かける前</p>
              <h2 id="start-wish"></h2>
              <span>立ち止まったら、くんくんサインを見てみて。</span>
            </div>

            <div class="dog dog-large is-restless" aria-hidden="true">
              <span class="tail"></span>
              <span class="body"></span>
              <span class="chest"></span>
              <span class="head"></span>
              <span class="ear ear-left"></span>
              <span class="ear ear-right"></span>
              <span class="muzzle"></span>
              <span class="brow brow-left"></span>
              <span class="brow brow-right"></span>
              <span class="eye eye-left"></span>
              <span class="eye eye-right"></span>
              <span class="nose"></span>
              <span class="mouth"></span>
              <span class="cheek cheek-left"></span>
              <span class="cheek cheek-right"></span>
              <span class="paw paw-left"></span>
              <span class="paw paw-right"></span>
            </div>

            <p class="safe-line">行かなくても、前まで行けたら十分。</p>

            <div class="action-dock">
              <button class="primary-button" type="button" id="begin-detour-button">出かける</button>
              <button class="ghost-button" type="button" id="start-skip-button">今日はやめる</button>
            </div>
          </div>
        </section>

        <section class="screen" id="sniff-screen" aria-labelledby="sniff-message">
          <div class="room room-sniff">
            <div class="lead-ring" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>

            <div class="speech-bubble main-bubble">
              <p>くんくんサイン</p>
              <h2 id="sniff-message">こっち、気になるみたい</h2>
              <span id="sniff-sub">振動は「少し見てみて」の合図。行かなくてもいい。</span>
            </div>

            <div class="dog dog-large is-curious" id="sniff-dog" aria-hidden="true">
              <span class="tail"></span>
              <span class="body"></span>
              <span class="chest"></span>
              <span class="head"></span>
              <span class="ear ear-left"></span>
              <span class="ear ear-right"></span>
              <span class="muzzle"></span>
              <span class="brow brow-left"></span>
              <span class="brow brow-right"></span>
              <span class="eye eye-left"></span>
              <span class="eye eye-right"></span>
              <span class="nose"></span>
              <span class="mouth"></span>
              <span class="cheek cheek-left"></span>
              <span class="cheek cheek-right"></span>
              <span class="paw paw-left"></span>
              <span class="paw paw-right"></span>
            </div>

            <div class="action-dock">
              <button class="primary-button" type="button" id="sniff-button">くんくんサインを見る</button>
              <button class="ghost-button" type="button" id="quit-button">今日はやめる</button>
            </div>
          </div>
        </section>

        <section class="screen" id="finish-screen" aria-labelledby="finish-title">
          <div class="room room-finish">
            <div class="window" aria-hidden="true"><span></span></div>
            <div class="rug" aria-hidden="true"></div>
            <div class="speech-bubble main-bubble">
              <p>おかえり</p>
              <h2 id="finish-title">今日はこれで十分</h2>
              <span id="finish-copy">前まで行けただけでも、ちゃんと自分の時間。</span>
            </div>

            <div class="dog dog-large is-happy" aria-hidden="true">
              <span class="tail"></span>
              <span class="body"></span>
              <span class="chest"></span>
              <span class="head"></span>
              <span class="ear ear-left"></span>
              <span class="ear ear-right"></span>
              <span class="muzzle"></span>
              <span class="brow brow-left"></span>
              <span class="brow brow-right"></span>
              <span class="eye eye-left"></span>
              <span class="eye eye-right"></span>
              <span class="nose"></span>
              <span class="mouth"></span>
              <span class="cheek cheek-left"></span>
              <span class="cheek cheek-right"></span>
              <span class="paw paw-left"></span>
              <span class="paw paw-right"></span>
            </div>

            <div class="action-dock">
              <button class="primary-button" type="button" data-screen-target="home">また呼んでね</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
