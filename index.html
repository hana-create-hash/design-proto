<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WagaMee</title>
    <link rel="stylesheet" href="./styles.css?v=remove-extra-illust" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="brand-button" type="button" data-screen-target="home" aria-label="WagaMeeの部屋へ戻る">
          <span class="brand-character" aria-hidden="true"></span>
          <span class="brand-logo">WagaMee</span>
        </button>
        <button class="test-button" type="button" id="notify-test-button">通知を試す</button>
      </header>

      <main>
        <section class="screen is-active" id="home-screen" aria-labelledby="home-wish">
          <div class="stage stage-room" data-room-memory>
            <div class="stage-overlay" aria-hidden="true"></div>
            <div class="room-memory" aria-hidden="true">
              <span class="memory-glow memory-glow-one"></span>
              <span class="memory-glow memory-glow-two"></span>
              <span class="memory-glow memory-glow-three"></span>
              <span class="memory-object memory-cup"><i></i></span>
              <span class="memory-object memory-sweet"><i></i><b></b></span>
              <span class="memory-object memory-cushion-object"></span>
              <span class="memory-object memory-ticket"></span>
            </div>

            <div class="notice-chip">今日のわがままが届きました</div>

            <div class="speech-bubble main-bubble">
              <p>小悪魔のひとこと</p>
              <h1 id="home-wish"></h1>
              <span>今日は、この子のせいにして少しだけわがままになる。</span>
            </div>

            <div class="character character-large is-looking" aria-label="ピンクの小悪魔キャラクター" role="img">
              <span class="aura"></span>
              <span class="sparkle sparkle-one"></span>
              <span class="sparkle sparkle-two"></span>
              <span class="sparkle sparkle-three"></span>
            </div>

            <div class="action-dock">
              <button class="primary-button" type="button" id="follow-button">わがままな時間をはじめる</button>
              <button class="ghost-button" type="button" id="home-skip-button">今日は部屋にいる</button>
            </div>
          </div>
        </section>

        <section class="screen" id="start-screen" aria-labelledby="start-wish">
          <div class="stage stage-outside">
            <div class="stage-overlay" aria-hidden="true"></div>

            <div class="speech-bubble side-bubble">
              <p>外の世界へ</p>
              <h2 id="start-wish"></h2>
              <span>立ち止まったら、スマホをゆっくり向けてみて。</span>
            </div>

            <div class="character character-large is-restless" aria-hidden="true">
              <span class="aura"></span>
              <span class="sparkle sparkle-one"></span>
              <span class="sparkle sparkle-two"></span>
              <span class="sparkle sparkle-three"></span>
            </div>

            <p class="safe-line">無理なら、いつでも今日はここまでで大丈夫。</p>

            <div class="action-dock">
              <button class="primary-button" type="button" id="begin-detour-button">小悪魔サインを受け取る</button>
              <button class="ghost-button" type="button" id="start-skip-button">今日はここまで</button>
            </div>
          </div>
        </section>

        <section class="screen" id="sniff-screen" aria-labelledby="sniff-message">
          <div class="stage stage-outside">
            <div class="stage-overlay" aria-hidden="true"></div>
            <div class="signal-ring" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>

            <div class="speech-bubble main-bubble signal-bubble">
              <p>小悪魔サイン</p>
              <h2 id="sniff-message">このへん、気になるみたい</h2>
              <span id="sniff-sub">振動したら、スマホを少し下げて周りを見てみて。</span>
              <small class="sensor-status" id="sensor-status">立ち止まって、スマホをゆっくり向けてみて。</small>
            </div>

            <div class="character character-large is-curious" id="sniff-character" aria-hidden="true">
              <span class="aura"></span>
              <span class="sparkle sparkle-one"></span>
              <span class="sparkle sparkle-two"></span>
              <span class="sparkle sparkle-three"></span>
            </div>

            <div class="action-dock">
              <button class="primary-button" type="button" id="sniff-button">サインを試す</button>
              <button class="ghost-button" type="button" id="quit-button">今日はここまで</button>
            </div>
          </div>
        </section>

        <section class="screen" id="finish-screen" aria-labelledby="finish-title">
          <div class="stage stage-room" data-room-memory>
            <div class="stage-overlay" aria-hidden="true"></div>
            <div class="room-memory" aria-hidden="true">
              <span class="memory-glow memory-glow-one"></span>
              <span class="memory-glow memory-glow-two"></span>
              <span class="memory-glow memory-glow-three"></span>
              <span class="memory-object memory-cup"><i></i></span>
              <span class="memory-object memory-sweet"><i></i><b></b></span>
              <span class="memory-object memory-cushion-object"></span>
              <span class="memory-object memory-ticket"></span>
            </div>

            <div class="speech-bubble main-bubble">
              <p>ただいま</p>
              <h2 id="finish-title">今日はこれで十分</h2>
              <span id="finish-copy">前まで行けただけでも、ちゃんと自分の時間。</span>
            </div>

            <div class="character character-large is-happy" aria-hidden="true">
              <span class="aura"></span>
              <span class="sparkle sparkle-one"></span>
              <span class="sparkle sparkle-two"></span>
              <span class="sparkle sparkle-three"></span>
            </div>

            <div class="action-dock">
              <button class="primary-button" type="button" data-screen-target="home">また呼んでね</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js?v=remove-extra-illust"></script>
  </body>
</html>
